<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e0e0e0;
      overflow: hidden;
    }

    .container {
      padding: 24px 20px 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 12px rgba(102, 126, 234, 0.3);
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: #a0a0b8;
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      margin: 16px 0;
    }

    .rule-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }

    .rule-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(102, 126, 234, 0.3);
    }

    .rule-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8888aa;
      margin-bottom: 8px;
    }

    .rule-example {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .rule-from {
      background: rgba(239, 83, 80, 0.15);
      color: #ef9a9a;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      border: 1px solid rgba(239, 83, 80, 0.2);
    }

    .rule-arrow {
      color: #667eea;
      font-size: 16px;
    }

    .rule-to {
      background: rgba(102, 126, 234, 0.15);
      color: #b3c0ff;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      border: 1px solid rgba(102, 126, 234, 0.2);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.2);
      border-radius: 8px;
      font-size: 12px;
      color: #a5d6a7;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: #666680;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">∑</div>
      <div class="header-text">
        <h1>LaTeX Copy Helper</h1>
        <p>Gemini → Notion 公式格式转换</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="rule-card">
      <div class="rule-label">行内公式转换</div>
      <div class="rule-example">
        <span class="rule-from">$...$</span>
        <span class="rule-arrow">→</span>
        <span class="rule-to">$$...$$</span>
      </div>
    </div>

    <div class="rule-card">
      <div class="rule-label">块级公式（保持不变）</div>
      <div class="rule-example">
        <span class="rule-to">$$...$$</span>
        <span class="rule-arrow">→</span>
        <span class="rule-to">$$...$$</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="status">
      <div class="status-dot"></div>
      <span>已在 Gemini 页面上激活，复制时自动转换</span>
    </div>

    <div class="footer">在 gemini.google.com 上复制内容时自动生效</div>
  </div>
</body>
</html>
